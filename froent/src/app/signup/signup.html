<div class="relative flex justify-center items-center bg-gradient-to-br from-blue-600 to-blue-800 min-h-screen">

  <!-- Decorative background blobs -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="-top-40 -right-40 absolute bg-yellow-300 opacity-70 blur-xl rounded-full w-80 h-80 animate-blob mix-blend-multiply filter"></div>
    <div class="-bottom-40 -left-40 absolute bg-yellow-400 opacity-70 blur-xl rounded-full w-80 h-80 animate-blob animation-delay-2000 mix-blend-multiply filter"></div>
    <div class="top-60 left-20 absolute bg-blue-300 opacity-70 blur-xl rounded-full w-80 h-80 animate-blob animation-delay-4000 mix-blend-multiply filter"></div>
  </div>

  <!-- Signup Card -->
  <div class="relative space-y-6 bg-white/95 shadow-2xl hover:shadow-yellow-200/50 backdrop-blur-sm p-8 rounded-2xl w-full max-w-md hover:scale-105 transition-all duration-500 transform">
    
    <!-- Gradient top bar -->
    <div class="top-0 left-0 absolute bg-gradient-to-r from-blue-600 via-yellow-400 to-blue-600 rounded-t-2xl w-full h-2"></div>

    <!-- Logo -->
    <div class="text-center">
      <h2 class="bg-clip-text bg-gradient-to-r from-blue-600 to-blue-800 mt-4 font-extrabold text-transparent text-3xl">
        Join Us Today!
      </h2>
      <p class="mt-2 text-gray-600 text-sm">Create your account in seconds</p>
    </div>

    <!-- Form -->
    <form class="space-y-5" (ngSubmit)="onSubmit()">

      <!-- Name Fields -->
      <div class="gap-3 grid grid-cols-2">
        <div class="relative">
          <div class="left-0 absolute inset-y-0 flex items-center pl-3 pointer-events-none">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <input name="firstName" [(ngModel)]="form.firstName" placeholder="First name" required
                 class="py-3 pr-3 pl-10 border-2 border-gray-200 focus:border-blue-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 w-full transition-all duration-300 placeholder-gray-400" />
        </div>
        <div class="relative">
          <div class="left-0 absolute inset-y-0 flex items-center pl-3 pointer-events-none">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <input name="lastName" [(ngModel)]="form.lastName" placeholder="Last name" required
                 class="py-3 pr-3 pl-10 border-2 border-gray-200 focus:border-blue-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 w-full transition-all duration-300 placeholder-gray-400" />
        </div>
      </div>

      <!-- Email -->
      <div class="relative">
        <div class="left-0 absolute inset-y-0 flex items-center pl-3 pointer-events-none">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
          </svg>
        </div>
        <input name="email" type="email" [(ngModel)]="form.email" placeholder="Email address" required
               class="py-3 pr-3 pl-10 border-2 border-gray-200 focus:border-blue-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 w-full transition-all duration-300 placeholder-gray-400" />
      </div>

      <!-- Password -->
      <div class="relative">
        <div class="left-0 absolute inset-y-0 flex items-center pl-3 pointer-events-none">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <input name="password" type="password" [(ngModel)]="form.password" placeholder="Password" required
               class="py-3 pr-3 pl-10 border-2 border-gray-200 focus:border-blue-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 w-full transition-all duration-300 placeholder-gray-400" />
      </div>

      <!-- Password Strength -->
      <div *ngIf="form.password.length > 0" class="px-1">
        <div class="flex gap-1 mb-1 h-1">
          <div class="flex-1 bg-gray-200 rounded-full">
            <div class="bg-red-500 h-full" [style.width]="form.password.length > 0 ? '25%' : '0%'"></div>
          </div>
          <div class="flex-1 bg-gray-200 rounded-full">
            <div class="bg-yellow-500 h-full" [style.width]="form.password.length > 5 ? '50%' : '0%'"></div>
          </div>
          <div class="flex-1 bg-gray-200 rounded-full">
            <div class="bg-green-500 h-full" [style.width]="form.password.length > 8 ? '75%' : '0%'"></div>
          </div>
        </div>
        <p class="text-gray-500 text-xs">
          Password strength:
          <span class="font-medium"
                [class.text-red-500]="form.password.length < 6"
                [class.text-yellow-500]="form.password.length >= 6 && form.password.length < 9"
                [class.text-green-500]="form.password.length >= 9">
            {{ form.password.length < 6 ? 'Weak' : form.password.length < 9 ? 'Medium' : 'Strong' }}
          </span>
        </p>
      </div>

      <!-- Role -->
      <div class="relative">
        <select name="role" [(ngModel)]="form.role"
                class="bg-white py-3 pr-10 pl-10 border-2 border-gray-200 focus:border-blue-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 w-full text-gray-700 transition-all duration-300 appearance-none cursor-pointer">
          <option value="STUDENT">👨‍🎓 Student</option>
          <option value="AGENT">🤝 Agent</option>
          <option value="ADMIN">👑 Admin</option>
        </select>
        <div class="right-0 absolute inset-y-0 flex items-center pr-3 pointer-events-none">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>

      <!-- Terms -->
      <div class="flex items-start">
        <input type="checkbox" required class="mt-1 mr-2 border-2 border-gray-300 rounded focus:ring-2 focus:ring-blue-500 w-4 h-4 text-blue-600">
        <label class="text-gray-600 text-sm">
          I agree to the <a href="#" class="text-blue-600 hover:underline">Terms</a> and <a href="#" class="text-yellow-600 hover:underline">Privacy Policy</a>
        </label>
      </div>

      <!-- Messages -->
      <p *ngIf="errorMessage" class="bg-red-500 px-4 py-2 rounded-lg text-white text-sm animate-pulse">⚠️ {{ errorMessage }}</p>
      <p *ngIf="successMessage" class="bg-green-500 px-4 py-2 rounded-lg text-white text-sm animate-pulse">✅ {{ successMessage }}</p>

      <!-- Submit -->
      <button type="submit" [disabled]="isSubmitting"
              class="group relative px-4 py-3 rounded-xl w-full overflow-hidden font-bold text-white text-base">
        <span class="absolute inset-0 bg-gradient-to-r from-blue-600 to-blue-800 w-full h-full"></span>
        <span class="absolute inset-0 bg-gradient-to-r from-yellow-400 to-yellow-500 opacity-0 group-hover:opacity-100 w-full h-full transition-opacity duration-300"></span>
        <span class="relative flex justify-center items-center">
          {{ isSubmitting ? 'Creating account...' : 'Create account' }}
        </span>
      </button>

    </form>
  </div>
</div>
